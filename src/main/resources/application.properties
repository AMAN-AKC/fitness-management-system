server.port=8080

# MySQL — change password to yours
spring.datasource.url=jdbc:mysql://localhost:3306/fitness_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Aman#4828

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBmaXRuZXNz
jwt.expiration.ms=86400000

# Authentication & Security (AC04, AC05)
auth.max-failed-attempts=5
auth.lockout-duration-minutes=15

# Password Complexity Policy (AC10)
# Configurable password requirements
password.min-length=12
password.require-uppercase=true
password.require-lowercase=true
password.require-digit=true
password.require-special-char=true

# HTTPS/SSL Configuration (AC09)
# Uncomment the following lines for HTTPS in production
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=your-keystore-password
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=tomcat
# server.port=8443

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Mail (disabled by default; enable and configure for real delivery)
spring.mail.enabled=false
spring.mail.from=no-reply@fitness.local

# Multipart (photo uploads)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# File Upload Configuration (AC06 - Photo/ID Upload)
# Local file upload directory
file.upload.directory=uploads/photos
# Maximum file size in bytes (5MB = 5242880 bytes)
file.upload.max-size=5242880
# Allowed file types (comma-separated, no spaces)
file.allowed-types=jpg,jpeg,png,pdf

# Class Booking (US06)
booking.noshow.penalty-threshold=3
booking.cancel.cutoff-hours=2

# Attendance / Check-in (US07)
attendance.duplicate-check-minutes=30
attendance.class-window-minutes=15

# Health consent / waiver policy (US09)
consent.current-version=v1.0
consent.validity-days=365
consent.retention-days=2555
